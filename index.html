<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEP Sanctions Reviewer</title>
    <!-- Bootstrap CSS for styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; padding-bottom: 50px; }
        .container { max-width: 1000px; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .match-yes { color: #d9534f; font-weight: bold; background-color: #f9d6d5 !important; }
        .match-no { color: #5cb85c; }
        .table-responsive { margin-top: 20px; }
        .search-box { margin-bottom: 20px; }
        .badge-pep { background-color: #ffc107; color: #000; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <h2 class="text-center mb-4">🇪🇺 MEP Sanctions Reviewer</h2>
    <p class="text-muted text-center">
        This tool helps you review the results of the OpenSanctions screening.
        <br><strong>Note:</strong> Most "YES" matches for MEPs are because they are <em>Politically Exposed Persons (PEPs)</em>, not necessarily sanctioned.
    </p>

    <!-- Search Box -->
    <div class="search-box">
        <input type="text" id="searchInput" class="form-control form-control-lg" placeholder="Search by name, country, or party...">
    </div>

    <!-- Table -->
    <div class="table-responsive">
        <table class="table table-hover table-bordered align-middle">
            <thead class="table-dark text-center">
                <tr>
                    <th>MEP Name</th>
                    <th>Country</th>
                    <th>Sanctions Match?</th>
                    <th>Match Details</th>
                    <th>Score</th>
                    <th>Link</th>
                </tr>
            </thead>
            <tbody id="mepTableBody">
                <tr>
                    <td colspan="6" class="text-center py-4">Loading data...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Load PapaParse (CSV Parser) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>
    const csvUrl = 'mep_sanctions_results.csv';
    let mepData = [];

    // 1. Fetch and Parse the CSV file
    Papa.parse(csvUrl, {
        download: true,
        header: true,
        complete: function(results) {
            // Remove empty rows and handle potential parsing issues
            mepData = results.data.filter(row => row.Name && row.Name.trim() !== ""); 
            displayData(mepData);
        },
        error: function(err) {
            console.error("Error loading CSV:", err);
            document.getElementById('mepTableBody').innerHTML = '<tr><td colspan="6" class="text-center text-danger">Error loading data. Make sure mep_sanctions_results.csv exists!</td></tr>';
        }
    });

    // 2. Function to display data in the table
    function displayData(data) {
        const tbody = document.getElementById('mepTableBody');
        tbody.innerHTML = '';

        if (data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4">No results found matching your search.</td></tr>';
            return;
        }

        data.forEach(mep => {
            const isMatch = mep['Sanctions Match'] === 'YES';
            const matchClass = isMatch ? 'match-yes' : '';
            const matchText = isMatch ? '⚠️ YES' : '✅ No';
            
            const row = `
                <tr class="${matchClass}">
                    <td><strong>${mep.Name}</strong></td>
                    <td class="text-center">${mep.Country}</td>
                    <td class="text-center font-monospace">${matchText}</td>
                    <td>
                        <div>${mep['Match Name'] || 'N/A'}</div>
                        ${isMatch ? '<span class="badge badge-pep">Potential PEP Hit</span>' : ''}
                    </td>
                    <td class="text-center">${mep['Match Score'] || '0'}</td>
                    <td class="text-center">
                        <a href="${mep['Profile URL']}" target="_blank" class="btn btn-sm btn-primary">Profile</a>
                    </td>
                </tr>
            `;
            tbody.innerHTML += row;
        });
    }

    // 3. Search functionality (Filters as you type)
    document.getElementById('searchInput').addEventListener('input', function(e) {
        const searchTerm = e.target.value.toLowerCase();
        const filteredData = mepData.filter(mep => 
            (mep.Name && mep.Name.toLowerCase().includes(searchTerm)) ||
            (mep.Country && mep.Country.toLowerCase().includes(searchTerm)) ||
            (mep['National Party'] && mep['National Party'].toLowerCase().includes(searchTerm))
        );
        displayData(filteredData);
    });
</script>

</body>
</html>

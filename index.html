<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEP Sanctions Reviewer</title>
    <!-- Bootstrap CSS for layout, but with custom overrides -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-body: #fdfdfd;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --primary: #3498db;
            --approve-bg: #e8f5e9;
            --approve-text: #2e7d32;
            --reject-bg: #ffebee;
            --reject-text: #c62828;
            --hit-bg: #fffcf0;
            --border-color: #f1f1f1;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding: 4rem 1rem;
        }

        .reviewer-container {
            max-width: 1100px;
            margin: 0 auto;
        }

        h1 {
            font-weight: 300;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
        }

        .header-meta {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 3rem;
        }

        /* Search area styling */
        .controls-row {
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .search-input {
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.8rem 1.5rem;
            font-size: 1rem;
            width: 100%;
            transition: all 0.2s ease;
            background-color: white;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .reset-btn {
            background: none;
            border: 1px solid #eee;
            color: var(--text-muted);
            font-size: 0.85rem;
            padding: 0.8rem 1.2rem;
            border-radius: 12px;
            white-space: nowrap;
        }

        .reset-btn:hover {
            background-color: #fafafa;
            color: var(--text-main);
        }

        /* Table redesign */
        .mep-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 0.75rem; /* Vertical space between rows */
        }

        .mep-table th {
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
            padding: 0.75rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .mep-table td {
            background: white;
            padding: 1.5rem; /* Large padding for breathing room */
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.2s ease;
        }

        /* First and last cell rounding */
        .mep-table td:first-child {
            border-left: 1px solid var(--border-color);
            border-top-left-radius: 12px;
            border-bottom-left-radius: 12px;
        }
        .mep-table td:last-child {
            border-right: 1px solid var(--border-color);
            border-top-right-radius: 12px;
            border-bottom-right-radius: 12px;
        }

        /* Row background transitions */
        tr.status-approved td { background-color: var(--approve-bg); border-color: #dcedc8; }
        tr.status-rejected td { background-color: var(--reject-bg); border-color: #ffcdd2; }
        tr.has-hit td { background-color: var(--hit-bg); }

        .mep-name {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 0.2rem;
        }

        .mep-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .hit-badge {
            display: inline-block;
            background: #fff9c4;
            color: #fbc02d;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            text-transform: uppercase;
        }

        /* Pill buttons */
        .action-pill {
            border: 1px solid #eee;
            background: white;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.2s ease;
            margin-right: 0.5rem;
        }

        .pill-approve:hover { background-color: var(--approve-bg); color: var(--approve-text); border-color: var(--approve-text); }
        .pill-reject:hover { background-color: var(--reject-bg); color: var(--reject-text); border-color: var(--reject-text); }

        .active-approve { background-color: var(--approve-bg); color: var(--approve-text); border-color: var(--approve-text); }
        .active-reject { background-color: var(--reject-bg); color: var(--reject-text); border-color: var(--reject-text); }

        .profile-link {
            font-size: 0.85rem;
            text-decoration: none;
            color: var(--primary);
        }

        .profile-link:hover { text-decoration: underline; }

        @media (max-width: 768px) {
            .controls-row { flex-direction: column; align-items: stretch; }
            .mep-table thead { display: none; }
            .mep-table td { display: block; padding: 1rem; border: none !important; border-radius: 0 !important; }
            .mep-table tr { margin-bottom: 1rem; display: block; border: 1px solid var(--border-color); border-radius: 12px; background: white; }
        }
    </style>
</head>
<body>

<div class="reviewer-container">
    <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.5rem;">
        <h1>Reviewer</h1>
        <a href="stats.html" class="profile-link" style="font-weight: 500;">View Statistics →</a>
    </div>
    <p class="header-meta">Screening results for European Parliament Members. Local persistence active.</p>

    <div class="controls-row">
        <input type="text" id="searchInput" class="search-input" placeholder="Search by name, country, or party...">
        <button class="reset-btn" onclick="downloadResults()" style="color: var(--primary); border-color: var(--primary);">Download CSV</button>
        <button class="reset-btn" onclick="clearAllReviews()">Reset Decisions</button>
    </div>

    <table class="mep-table" id="mepTable">
        <thead>
            <tr>
                <th style="width: 35%">Person</th>
                <th style="width: 15%">Status</th>
                <th style="width: 25%">Match Details</th>
                <th style="width: 25%; text-align: right;">Review</th>
            </tr>
        </thead>
        <tbody id="mepTableBody">
            <!-- Data loaded here -->
        </tbody>
    </table>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>
    const csvUrl = 'mep_sanctions_results.csv';
    let mepData = [];
    let userDecisions = JSON.parse(localStorage.getItem('mep_decisions')) || {};

    Papa.parse(csvUrl, {
        download: true,
        header: true,
        complete: function(results) {
            mepData = results.data.filter(row => row.Name && row.Name.trim() !== ""); 
            render();
        }
    });

    function render() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const tbody = document.getElementById('mepTableBody');
        tbody.innerHTML = '';

        const filtered = mepData.filter(mep => 
            mep.Name.toLowerCase().includes(searchTerm) ||
            mep.Country.toLowerCase().includes(searchTerm)
        );

        filtered.forEach(mep => {
            const mepId = mep.Name;
            const decision = userDecisions[mepId] || 'pending';
            const isHit = mep['Sanctions Match'] === 'YES';
            
            let rowClass = '';
            if (decision === 'approved') rowClass = 'status-approved';
            else if (decision === 'rejected') rowClass = 'status-rejected';
            else if (isHit) rowClass = 'has-hit';

            const tr = document.createElement('tr');
            tr.className = rowClass;
            tr.innerHTML = `
                <td>
                    <div class="mep-name">${mep.Name}</div>
                    <div class="mep-meta">${mep.Country} • ${mep['Political Group'] || 'Unknown'}</div>
                </td>
                <td>
                    <span style="font-size: 0.85rem; font-weight: 600; color: ${isHit ? '#d35400' : '#27ae60'}">
                        ${isHit ? 'POTENTIAL HIT' : 'CLEAR'}
                    </span>
                </td>
                <td>
                    <div style="font-size: 0.8rem; line-height: 1.4;">
                        ${mep['Match Name'] !== 'N/A' ? `<strong>${mep['Match Name']}</strong><br>` : ''}
                        <span style="color: var(--text-muted)">Score: ${mep['Match Score'] || '0.00'}</span>
                        ${isHit ? '<br><span class="hit-badge">PEP</span>' : ''}
                    </div>
                </td>
                <td style="text-align: right;">
                    <div style="margin-bottom: 0.5rem;">
                        <button class="action-pill pill-approve ${decision === 'approved' ? 'active-approve' : ''}" onclick="makeDecision('${mepId}', 'approved')">Approve</button>
                        <button class="action-pill pill-reject ${decision === 'rejected' ? 'active-reject' : ''}" onclick="makeDecision('${mepId}', 'rejected')">Reject</button>
                    </div>
                    <a href="${mep['Profile URL']}" target="_blank" class="profile-link">EP Profile →</a>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function makeDecision(mepId, decision) {
        if (userDecisions[mepId] === decision) delete userDecisions[mepId];
        else userDecisions[mepId] = decision;
        localStorage.setItem('mep_decisions', JSON.stringify(userDecisions));
        render();
    }

    function clearAllReviews() {
        if (confirm("Reset all decisions?")) {
            userDecisions = {};
            localStorage.removeItem('mep_decisions');
            render();
        }
    }

    function downloadResults() {
        // Create an updated data array that includes your decisions
        const reviewedData = mepData.map(mep => {
            return {
                ...mep,
                'Review Status': userDecisions[mep.Name] || 'Pending'
            };
        });

        // Convert the array back into CSV format using PapaParse
        const csvString = Papa.unparse(reviewedData);

        // Create a hidden link to trigger the browser's download
        const blob = new Blob([csvString], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        
        link.setAttribute("href", url);
        link.setAttribute("download", "mep_reviewed_results.csv");
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
        console.log("Download started!");
    }

    document.getElementById('searchInput').addEventListener('input', render);
</script>

</body>
</html>
